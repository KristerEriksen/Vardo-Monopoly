services:
  monopoly:
    build: .
    container_name: monopoly
    ports:
      - "${APP_BIND_IP:-127.0.0.1}:${APP_PORT:-8082}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
