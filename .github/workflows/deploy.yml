name: Deploy Monopoly

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      IMAGE: ghcr.io/kristereriksen/monopoly:latest
      CONTAINER_NAME: monopoly

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          set -e
          # Dockerfile ligger i repo-roten, med backend/ og frontend/ som undermapper.
          docker build -t "$IMAGE" -f Dockerfile .
          docker push "$IMAGE"

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          envs: IMAGE,CONTAINER_NAME,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e

            IMAGE="${{ env.IMAGE }}"
            CONTAINER_NAME="${{ env.CONTAINER_NAME }}"
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            GHCR_TOKEN="${{ secrets.GHCR_TOKEN }}"

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            docker pull "$IMAGE"
            docker rm -f "$CONTAINER_NAME" || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 8082:3000 \
              "$IMAGE"

            docker ps --filter "name=$CONTAINER_NAME"
